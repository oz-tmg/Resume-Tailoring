# Master skills list — ordered within each category by proficiency/relevance.
# families: lists which job families should surface this skill prominently.
# tier: 1 = core/lead skill, 2 = solid working knowledge, 3 = familiar/supporting

programming:
  - name: Python
    tier: 1
    families: [DS, MLE, DE, AE, DA]
    keywords: [Python]
  - name: R
    tier: 1
    families: [DS, DA, ECON]
    keywords: [R]
  - name: SQL
    tier: 1
    families: [DA, AE, DE, DS, MLE, ECON]
    keywords: [SQL]
  - name: Bash
    tier: 2
    families: [DE, AE, MLE]
    keywords: [Bash, shell scripting]
  - name: Ruby
    tier: 3
    families: [MLE, DS]
    keywords: [Ruby]

data_science:
  - name: A/B Testing & Experimentation
    tier: 1
    families: [DS, DA, ECON, MLE]
    keywords: [A/B testing, experimentation, hypothesis testing, significance]
  - name: Causal Inference
    tier: 1
    families: [DS, ECON, DA]
    keywords: [causal inference, propensity score matching, quasi-experimental,
               difference-in-differences, coarsened exact matching, CEM,
               kernel matching, observational studies]
  - name: Predictive Modelling
    tier: 1
    families: [DS, MLE]
    keywords: [predictive modelling, supervised learning, regression,
               classification, XGBoost, gradient boosting, SVM, support
               vector machines, decision trees, random forests]
  - name: Churn Prediction
    tier: 1
    families: [DS, MLE, DA]
    keywords: [churn prediction, survival analysis, retention modelling]
  - name: Recommendation Systems
    tier: 1
    families: [DS, MLE]
    keywords: [recommendation systems, RecSys, collaborative filtering,
               ranking, targeting]
  - name: Forecasting
    tier: 1
    families: [DS, DA, ECON]
    keywords: [forecasting, time series, revenue forecasting, LTV]
  - name: Bayesian Analysis
    tier: 2
    families: [DS, ECON, MLE]
    keywords: [Bayesian, Thompson Sampling, probabilistic modelling]
  - name: NLP
    tier: 3
    families: [DS, MLE]
    keywords: [NLP, natural language processing, text analysis]
  - name: Uplift Modelling
    tier: 2
    families: [DS, MLE]
    keywords: [uplift modelling, incremental value, treatment effect]
  - name: Behavioral Clustering
    tier: 2
    families: [DS, MLE, DA]
    keywords: [clustering, segmentation, GMM, k-means, behavioral analysis]
  - name: Multi-Armed Bandit
    tier: 2
    families: [DS, MLE]
    keywords: [multi-armed bandit, MAB, Thompson Sampling, Epsilon Greedy,
               online learning]

