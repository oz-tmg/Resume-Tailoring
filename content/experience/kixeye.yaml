      - id: kix_matchmaking_churn
        text: >
          Diagnosed a hidden interaction between competing user pathways that
          undermined the platform's matching logic and increased churn; used
          behavioral clustering and churn modeling to quantify the issue, then
          guided a hybrid recommendation redesign that improved retention and
          engagement in affected cohorts.
        families: [DS, MLE, DA]
        keywords: [churn, clustering, recommendation, retention, engagement,
                   behavioral analysis, matchmaking, causal inference]
        tier: 1
        variants:
          DA: >
            Identified a structural flaw in the matchmaking system driving
            elevated churn; quantified the affected player population through
            behavioral segmentation and worked with product and engineering
            on a redesign that improved retention in impacted cohorts.
          DS: >
            Applied behavioral clustering and churn modeling to diagnose a
            platform matching failure causing abnormal attrition; guided a
            hybrid recommendation redesign that improved retention and
            engagement metrics in the affected player segments.
          ECON: >
            Identified a platform design externality where competing user
            pathways undermined the matching mechanism and generated negative
            spillovers on retention; used behavioral segmentation to quantify
            the welfare loss and informed a market design intervention that
            improved platform efficiency and participant retention.
          GAMES: >
            Diagnosed a hidden matchmaking failure in a live mobile game where
            competing player pathways undermined alliance-matching logic and
            elevated churn; used behavioral clustering and churn modelling to
            quantify the problem, then guided a recommendation redesign that
            improved DAU retention in affected player cohorts.

