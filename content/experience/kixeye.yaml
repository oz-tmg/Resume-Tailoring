  # ---------------------------------------------------------------------------
  # Lead Data Analyst, Core Analytics Team Lead  (Feb 2022 – Jan 2025)
  # Formerly in kixeye_sfg.yaml as role id: kix_sfg_lead
  # ---------------------------------------------------------------------------
  - id: kix_lead
    title: Lead Data Analyst, Core Analytics Team Lead
    start: 2022-02
    end: 2025-01
    location: Victoria, BC Canada
    summary: >
      Led analytics roadmap and delivery for junior and senior analysts on
      Kixeye's Core Analytics Team. Later transitioned into more ML pipeline
      and analytical engineering work within Stillfront Group.

    bullets:
      - id: kix_two_games_delivery
        text: >
          Managed the team's delivery of analytics reporting and tooling for
          two new game launches using Snowflake and Looker.
        families: [DA, AE, DS]
        keywords: [Snowflake, Looker, reporting, tooling, team delivery, KPI,
                   live-service, game launch]
        tier: 2

      - id: kix_snowflake_cost
        text: >
          Reduced monthly Snowflake warehousing costs by 45% through ETL and
          orchestration optimization, saving an estimated $130K annually.
        families: [DE, AE]
        keywords: [Snowflake, ETL, orchestration, cost reduction, warehousing,
                   optimization]
        tier: 1

      - id: kix_looker_migration
        text: >
          Independently migrated both Kixeye and Babil Games studios' Looker
          dashboards onto Stillfront's shared instance, reducing studio costs
          by $90K annually while improving reporting continuity.
        families: [DA, AE, DE]
        keywords: [Looker, migration, dashboards, BI, cost reduction, reporting]
        tier: 1

      - id: kix_forecasting_model
        text: >
          Developed a long-term revenue forecasting model in R and Python used
          in acquisition assessment, helping identify and correct a $14M
          overestimation in a game acquisition deal.
        families: [DS, DA, ECON]
        keywords: [forecasting, revenue, R, Python, valuation, financial
                   modelling, acquisition, time series]
        tier: 1
        variants:
          ECON: >
            Built a long-term revenue forecasting model used in acquisition
            due diligence, identifying a $14M overestimation through
            independent valuation modelling — directly influencing the
            investment decision.
          DS: >
            Developed a long-term revenue forecasting model in R and Python
            for game acquisition assessment; identified and corrected a $14M
            overestimation, demonstrating the value of rigorous model
            evaluation in strategic contexts.

      - id: kix_matchmaking_churn
        text: >
          Diagnosed a hidden interaction between competing user pathways that
          undermined the platform's matching logic and increased churn; used
          behavioral clustering and churn modeling to quantify the issue, then
          guided a hybrid recommendation redesign that improved retention and
          engagement in affected cohorts.
        families: [DS, MLE, DA]
        keywords: [churn, clustering, recommendation, retention, engagement,
                   behavioral analysis, matchmaking, gameplay balance, economy,
                   causal inference]
        tier: 1
        variants:
          # DA: concise default (general-purpose) + a gaming-detailed
          # alternate that carries its own sub-bullets (the hand-written
          # "Restored PvP viability" story). The posting ranker chooses the
          # gaming-detailed alternate for gaming/game-systems postings.
          DA:
            - id: concise
              default: true
              text: >
                Identified a structural flaw in the matchmaking system driving
                elevated churn; quantified the affected player population
                through behavioral segmentation and worked with product and
                engineering on a redesign that improved retention in impacted
                cohorts.
            - id: gaming_detailed
              text: >
                Restored PvP viability for the segment hit hardest by a
                thinning opponent pool — an externality of the earlier
                matchmaking stop-gaps — by simulating optimal defender base
                configurations and generating progression-tiered bot-base specs
                for Design to author and Engineering to ship as A/B-testable
                content.
              sub_bullets:
                - id: kix_pvp_models
                  text: >
                    Built and cross-validated three logistic models — PvP
                    match-initiation propensity, expected resource/premium-
                    currency sink, and 7-day forward engagement — extending the
                    framework from the original matchmaking diagnosis, then
                    combined them into a multi-objective score.
                  families: [DA, DS]
                - id: kix_pvp_simulation
                  text: >
                    Simulated defender base-attribute combinations and ranked
                    optimal configurations by attacker level tier.
                  families: [DA, DS]
                - id: kix_pvp_retention
                  text: >
                    Iterated to a net-positive, segment-specific result — a
                    retention lift up to 2 points emerging from D14 onward (not
                    D7), concentrated in mid-progression players, with
                    incremental late-cohort revenue among returning spenders as
                    cohorts matured — and surfaced why early- and late-game
                    players responded less, informing downstream economy
                    balancing.
                  families: [DA, DS]
          DS:
            - id: concise
              default: true
              text: >
                Applied behavioral clustering and churn modeling to diagnose a
                platform matching failure causing abnormal attrition; guided a
                hybrid recommendation redesign that improved retention and
                engagement metrics in the affected player segments.
            - id: gaming_detailed
              text: >
                Restored PvP viability for the segment hit hardest by a
                thinning opponent pool by modeling player behaviour and
                simulating optimal defender base configurations, then generating
                progression-tiered bot-base specs shipped as A/B-testable
                content.
              sub_bullets:
                - id: kix_pvp_models_ds
                  text: >
                    Built and cross-validated three logistic models — PvP
                    match-initiation propensity, expected resource/premium-
                    currency sink, and 7-day forward engagement — and combined
                    them into a multi-objective optimization score.
                  families: [DS, DA]
                - id: kix_pvp_retention_ds
                  text: >
                    Iterated to a net-positive, segment-specific retention lift
                    of up to 2 points emerging from D14 onward, concentrated in
                    mid-progression players, with incremental late-cohort
                    revenue among returning spenders.
                  families: [DS, DA]
          ECON: >
            Identified a platform design externality where competing user
            pathways undermined the matching mechanism and generated negative
            spillovers on retention; used behavioral segmentation to quantify
            the welfare loss and informed a market design intervention that
            improved platform efficiency and participant retention.

      - id: kix_cohort_ltv_stillfront
        text: >
          Partnered with Stillfront's data science team to improve cohort LTV
          forecasting, producing more realistic month-to-month revenue targets.
        families: [DS, DA, ECON]
        keywords: [LTV, cohort analysis, forecasting, revenue, partnership,
                   product analytics]
        tier: 2

      - id: kix_cross_promo
        text: >
          Partnered with other Stillfront studios to define KPI frameworks,
          build reporting, and deliver deeper analysis for game cross-promotion
          initiatives.
        families: [DA, DS]
        keywords: [KPI, frameworks, cross-promotion, stakeholder, reporting,
                   product analytics]
        tier: 2

  # ---------------------------------------------------------------------------
  # Senior Product Analyst, Acting Core Analytics Team Lead  (Jan 2021 – Feb 2022)
  # Formerly in kixeye_sfg.yaml as role id: kix_sfg_senior
  # ---------------------------------------------------------------------------
  - id: kix_senior
    title: Senior Product Analyst, Acting Core Analytics Team Lead
    start: 2021-01
    end: 2022-02
    location: Victoria, BC Canada
    summary: >
      Promoted to help establish a small analytics team and improve
      collaboration across product, design, and engineering. Supported
      multiple game teams while building better analytical workflows and
      decision support.

    bullets:
      - id: kix_content_cadence
        text: >
          Used multi-stage conversion funnel models and time-series spend
          dynamics to guide the Design team toward a new content cadence
          strategy, resulting in more consistent monetization and reduced
          performance volatility across releases.
        families: [DS, DA, ECON]
        keywords: [funnel analysis, time series, spend, monetization,
                   conversion, product analytics, stakeholder influence]
        tier: 1
        variants:
          DA: >
            Collaborated with the Design team to build a new content cadence
            strategy backed by funnel analysis and spend trend modeling,
            resulting in more consistent monetization and reduced revenue
            volatility across content releases.
          ECON: >
            Applied time-series expenditure analysis and multi-stage
            conversion modelling to identify suboptimal content release
            timing; evidence-based recommendations shifted cadence strategy
            and reduced monetization volatility across releases.

      - id: kix_ab_automation
        text: >
          Automated KPI forecasting and A/B test reporting ETLs for Product
          and Design teams, improving experimentation support and freeing
          substantial analyst time.
        families: [DA, AE, DS, DE]
        keywords: [A/B testing, KPI, forecasting, automation, ETL,
                   experimentation, reporting]
        tier: 1

      - id: kix_churn_model
        text: >
          Increased churn prediction accuracy from AUC 0.71 to 0.86 in
          Python, helping identify and remediate multiple gameplay-related
          churn drivers.
        families: [DS, MLE, DA]
        keywords: [churn prediction, AUC, Python, classification, machine
                   learning, model improvement, retention, Bayesian,
                   gameplay balance, economy]
        tier: 1
        # DA telling of the same work: leads with the design outcome and the
        # Bayesian-when-A/B-infeasible method rather than the AUC metric.
        variants:
          DA: >
            Helped the Design team discover and remediate multiple churn
            triggers tied to progression, gameplay balance, and economy shocks,
            using Bayesian logistic regression when A/B tests were infeasible.

      - id: kix_alliance_recsys
        text: >
          Built an Alliance Recommendation Engine in Python that ranked social
          groups by predicted uplift in engagement and spend conversion,
          materially improving retention and increasing yearly revenue by 7%
          in concert with other improvements.
        families: [DS, MLE]
        keywords: [recommendation engine, Python, uplift modelling, retention,
                   revenue, engagement, RecSys, spend conversion]
        tier: 1

      - id: kix_alliance_network_analysis
        text: >
          Used network analysis to show how alliances differed in their effect
          on member engagement, then partnered with Customer Service on
          solutions for tracking MVPs and alliance leadership.
        families: [DA, DS]
        keywords: [network analysis, social graph, engagement, alliances,
                   behavioral segmentation, retention]
        tier: 2

      - id: kix_elo_matchmaking_diagnosis
        text: >
          Used logit regression to confirm player disengagement from PvP and
          elevated churn among PvP-centric player clusters caused by the ELO
          matchmaking system; partnered with Engineering on interim guardrails
          that reduced churn but narrowed the matchable opponent pool.
        families: [DS, DA]
        keywords: [logit regression, churn, PvP, ELO, matchmaking,
                   behavioral segmentation, gameplay balance]
        tier: 2

