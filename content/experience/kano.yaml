company: Kano Apps
division: Casual Games
logo: icons/logos/kano_logo.png

roles:
  - id: kano_senior_de_bi
    title: Senior Game Data Engineer & BI Analyst
    start: 2025-05
    end: 2026-02
    location: Victoria, BC Canada
    summary: >
      Hired to modernize the studio's analytics stack by migrating reporting
      and transformation workflows from RShiny to a scalable Python- and
      AWS-based platform.

    bullets:
      - id: kano_dbt
        text: >
          Added DBT to the platform to better model, scale, and optimize
          transformations across the analytics stack.
        families: [DE, AE]
        keywords: [dbt, data modelling, transformations, analytics engineering]
        tier: 2

      - id: kano_rshiny_migration
        text: >
          Reworked, enhanced, and migrated numerous RShiny reports to AWS
          Quicksight, improving reliability, accessibility, and maintainability.
        families: [DE, AE, DA]
        keywords: [RShiny, Quicksight, AWS, migration, dashboards, BI]
        tier: 2

      - id: kano_etl_performance
        text: >
          Reduced daily report refresh times from up to 14 hours to less than
          1 hour while lowering EC2 and Athena costs by migrating expensive R
          ETLs into optimized DBT-Athena SQL models on partitioned Parquet and
          Iceberg tables.
        families: [DE, AE]
        keywords: [ETL, Athena, Parquet, Iceberg, DBT, SQL, cost reduction,
                   performance, EC2, data latency]
        tier: 1
      - id: kano_etl_r_to_python_migration
        text: >
          Executed R-to-Python migration of legacy ETL pipelines inherited from a
          single-author codebase characterised by undocumented, non-modular scripts
          exceeding 10,000 lines; applied LLM-assisted code translation selectively
          where script structure permitted, and manually refactored the remainder
          using deep bilingual R and Python expertise — the combination of skills
          that made the migration viable at all.
        families: [DE, AE, DS]
        keywords: [R, Python, ETL, migration, legacy codebase, refactoring,
                  LLM-assisted development, AI tooling, code translation,
                  technical debt, bilingual, R to Python]
        tier: 2
        variants:
          DA: >
            Preserved full analytical parity across a complex R-to-Python ETL
            migration, manually validating migrated pipelines inherited from an
            undocumented, monolithic codebase using bilingual R and Python
            proficiency — ensuring stakeholders could trust reporting outputs
            throughout the transition.
          DE: >
            Migrated a legacy R ETL codebase to Python, navigating undocumented,
            monolithic scripts exceeding 10,000 lines that exceeded LLM context
            limits; applied AI-assisted translation where script structure permitted
            and manually refactored the remainder, leveraging bilingual R and Python
            proficiency to deliver the full migration without analytical regression.
          AE: >
            Translated a non-modular, single-author R ETL codebase into Python,
            applying LLM-assisted code translation selectively on tractable modules
            while manually refactoring scripts too large and unstructured for AI
            tooling; deep bilingual R and Python expertise was the critical enabler
            that made the migration viable.
          DS: >
            Leveraged LLM-assisted code translation and bilingual R/Python expertise
            to migrate legacy ETL pipelines from R to Python, navigating an
            undocumented codebase with 10,000+ line scripts that exceeded LLM
            context limits — applying AI tooling selectively and completing the
            remainder through manual refactoring.

      - id: kano_analyst_adoption
        text: >
          Improved analyst adoption of the new stack by showcasing workflows,
          onboarding teammates, and standardizing how reporting was produced
          and maintained.
        families: [AM, AE, DE]
        keywords: [onboarding, documentation, standardization, collaboration,
                   reporting, team enablement]
        tier: 2

      - id: kano_anomaly_detection
        text: >
          Migrated the analytical-event anomaly detection framework off
          RStudio Server and RShiny onto Python, DBT SQL, Prefect, AWS
          Athena, and Quicksight; extended coverage to irregular-cadence
          events that the prior framework dropped, by folding their known
          cadence into the standard error calculation so they alert against
          the right baseline.
        families: [DS, MLE, AE, DE]
        keywords: [anomaly detection, statistical monitoring, Python, DBT,
                   Prefect, AWS Athena, Quicksight, RShiny migration,
                   irregular cadence, standard error, time series,
                   production monitoring]
        tier: 1

      - id: kano_legacy_dsm_review
        text: >
          Audited inherited data science assets — decision-tree and
          random-forest churn and behaviour models trained on poorly
          sampled data — and recommended against migrating them, citing
          disuse and predictive power that was both underwhelming and
          misleading against current event definitions.
        families: [DS, MLE]
        keywords: [model audit, model governance, decision trees, random
                   forests, sampling bias, predictive validity, technical
                   debt]
        tier: 3
