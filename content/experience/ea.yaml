company: Electronic Arts
division: AAA Games
logo: icons/logos/ea_sports.png

roles:
  - id: ea_data_scientist
    title: Data Scientist, Dynamic Experiences Team
    start: 2018-11
    end: 2019-07
    location: Burnaby, BC Canada
    summary: >
      Helped establish a Data Science team embedded within EA Sports live
      teams to prototype and support machine learning systems that delivered
      more personalized player experiences.

    bullets:
      - id: ea_ab_test_design
        text: >
          Proposed, designed, and evaluated A/B test messaging campaigns aimed
          at delivering more personalized in-game experiences using R, SQL,
          and HiveQL.
        families: [DS, DA, ECON]
        keywords: [A/B testing, experimentation, R, SQL, HiveQL, personalization,
                   messaging, campaign design]
        tier: 1

      - id: ea_upsell_segmentation
        text: >
          Identified player segments most likely to respond positively to
          upsell messaging, contributing to a 3% cohort spend increase.
        families: [DS, DA, MLE]
        keywords: [segmentation, targeting, upsell, spend, cohort analysis,
                   personalization]
        tier: 1

      - id: ea_fifa19_revenue
        text: >
          Analysis and recommendations from in-game messaging experiments
          generated an additional $2M in revenue for FIFA 19.
        families: [DS, DA, ECON]
        keywords: [experimentation, revenue impact, A/B testing, messaging,
                   monetization, product analytics]
        tier: 1

      - id: ea_ab_automation
        text: >
          Automated A/B test analysis workflows using Hive, Jenkins, R, and
          Redshift to make experimental readouts faster and more repeatable.
        families: [DS, AE, DE, DA]
        keywords: [A/B testing, automation, Hive, Jenkins, R, Redshift,
                   experimentation, workflow]
        tier: 1

      - id: ea_mab_recsys
        text: >
          Built multi-armed bandit messaging recommendation engines in Ruby
          for FIFA 20 personalization use cases.
        families: [DS, MLE]
        keywords: [multi-armed bandit, recommendation engine, Ruby,
                   personalization, MAB, RecSys]
        tier: 1

      - id: ea_churn_reacquisition_models
        text: >
          Developed new-player churn, pack spend conversion, and reacquisition
          prediction models in R to support recommendation systems and guide
          user reactivation efforts.
        families: [DS, MLE]
        keywords: [churn prediction, pack spend conversion, reacquisition, R,
                   predictive modelling, recommendation systems, retention]
        tier: 1

  - id: ea_business_analyst
    title: Business Analyst, FIFA Player Analytics Team
    start: 2016-06
    end: 2018-11
    location: Burnaby, BC Canada
    summary: >
      Supported executive reporting, player engagement and monetization
      analysis, and licensing analytics for one of EA's largest franchises.

    bullets:
      - id: ea_exec_reporting
        text: >
          Managed game performance and insight delivery for monthly executive
          board meetings for EA Sports titles, and became trusted with
          reporting support for Motive, BioWare, and DICE studios.
        families: [DA]
        keywords: [executive reporting, stakeholder management, KPI, insights,
                   product analytics]
        tier: 2

      - id: ea_licensing_automation
        text: >
          Owned analytics reporting for FIFA's strategic licensing partners and
          automated large portions of the process using R and Talend, reducing
          weeks of manual work assembling 550 slides to seconds.
        families: [DA, AE, DE]
        keywords: [automation, R, Talend, reporting, licensing, ETL,
                   stakeholder, efficiency]
        tier: 1

      - id: ea_licensing_models
        text: >
          Built statistical models to assess the value each license created for
          EA and the reciprocal value exposure provided to partners, helping
          improve licensing decisions.
        families: [DS, DA, ECON]
        keywords: [statistical modelling, licensing valuation, partner
                   analytics, causal inference, decision support]
        tier: 2
        # --- VARIANTS ---
        variants:
          DA: >
            Built statistical models measuring the revenue impact each sports
            license generated for EA and the brand exposure value returned to
            partners, informing smarter procurement and renewal decisions.
          DS: >
            Developed bilateral value estimation models for FIFA's licensing
            portfolio — quantifying both EA-side revenue attribution per
            license and the exposure value delivered to each partner — to
            support data-driven procurement strategy.
          ECON: >
            Constructed a two-sided valuation framework to estimate the
            economic value of EA's sports licenses: quantifying licence-
            attributable demand effects for EA and measuring the advertising
            externality (brand exposure and reach) provided to licensing
            partners, improving contract pricing and renewal strategy.

      - id: ea_companion_app
        text: >
          Used propensity score matching in R to estimate the incremental value
          of FIFA's Companion App and Web App, producing evidence that helped
          save the Web App and support greater investment in the companion app
          ecosystem.
        sub_bullets:
          - id: ea_companion_app_revenue
            text: >
              Incremental spending gains among spenders of 4.2% for Web App
              users and 7.0% for Mobile App users, leading to millions in
              incremental revenue.
            families: [DS, DA, ECON]
          - id: ea_companion_app_analyticon
            text: >
              Presented findings at EA's 2018 Analyticon conference.
            families: [DS, DA, ECON]
          - id: ea_companion_app_madden
            text: >
              Findings and follow-on performance helped influence the Madden
              team to develop a companion app for Madden 19.
            families: [DA, ECON]
        families: [DS, DA, ECON]
        keywords: [propensity score matching, causal inference, incremental
                   value, R, companion app, product valuation, Analyticon]
        tier: 1
        # --- VARIANTS: strongest causal inference story in the portfolio ---
        variants:
          DA: >
            Applied propensity score matching in R to measure the true
            engagement and spend lift from FIFA's Companion and Web Apps,
            providing the evidence base that saved the Web App from
            discontinuation and secured ongoing investment in both platforms.
          DS: >
            Used propensity score matching on player cohorts in R to estimate
            the causal incremental value of FIFA's Companion App and Web App;
            results demonstrated significant lift in spending behavior and
            directly influenced platform investment decisions.
          ECON: >
            Applied quasi-experimental propensity score matching to construct
            comparable treatment and control cohorts and estimate the
            incremental consumer surplus and revenue impact of FIFA's digital
            companion platforms; causal estimates showed 4.2% incremental
            spend lift (Web App) and 7.0% (Mobile App), reversing a planned
            discontinuation and reallocating investment toward higher-return
            platform development.

      # ea_companion_app_revenue and ea_analyticon are now sub_bullets above.
      # Kept as standalone fallbacks below (tier 3) for families or postings
      # where sub_bullets are suppressed and the detail still needs to surface.
      - id: ea_companion_app_revenue
        text: >
          Incremental spending gains of 4.2% for Web App users and 7.0% for
          Mobile App users, leading to millions in incremental revenue across
          the FIFA franchise.
        families: [DS, DA, ECON]
        keywords: [incremental revenue, spend uplift, causal inference,
                   monetization, product impact]
        tier: 3
