id: MLE
label: ML Engineer
summary_ref: ml_engineer

# ---------------------------------------------------------------------------
# BULLET SELECTION RULES
# Note: MLE is your thinnest family — the portfolio skews DS and DE.
# Strategy: emphasize production ML systems, pipeline ownership, model
# deployment, and evaluation rigor. Avoid framing that reads as pure research.
# ---------------------------------------------------------------------------
bullet_selection:
  max_bullets_per_role:
    kano_senior_de_bi: 2          # Infrastructure wins only
    kix_lead: 3
    kix_senior: 4             # Best MLE signals here
    kix_product_analyst: 3
    ea_data_scientist: 4          # MAB + churn models in production
    ea_business_analyst: 1        # Thin MLE signal — propensity model only
    pretio_data_scientist: 2
    tinymob_data_analyst: 0       # No meaningful MLE signal

  min_tier: 1

  priority_bullets:
    - kix_alliance_recsys     # Production RecSys with revenue outcome
    - kix_churn_model         # Model improvement with concrete AUC gains
    - kix_matchmaking_churn   # System diagnosis + redesign
    - kix_domino_jenkins          # ML pipeline migration — strongest MLOps signal
    - kix_spend_conversion        # Production ML tooling + experimentation
    - ea_mab_recsys               # Production MAB in Ruby — RecSys in prod
    - ea_churn_reacquisition_models  # Multi-model production development
    - ea_ab_automation            # ML workflow automation
    - ea_upsell_segmentation      # Targeting model with spend outcome
    - pretio_thompson_sampling    # Online learning algorithm swap
    - pretio_conversion_model     # Probability model in production context
    - kano_etl_performance        # Infrastructure / pipeline performance
    - kix_ab_automation       # Automation of ML reporting pipelines

  exclude_bullets:
    - kano_rshiny_migration       # BI migration, not ML
    - kano_analyst_adoption       # Team enablement, not MLE
    - kano_dbt                    # AE signal, not MLE
    - kix_looker_migration    # BI migration, not ML
    - kix_cross_promo         # Business analytics, not MLE
    - kix_content_cadence     # Analytics framing, not MLE
    - kix_ua_strategy             # Business strategy, not MLE
    - ea_exec_reporting           # Soft reporting
    - ea_licensing_automation     # Talend/R automation, not ML
    - ea_licensing_models         # Statistical, not ML production
    - ea_analyticon               # Presentation, not MLE
    - ea_companion_app_revenue    # Business outcome without ML framing
    - pretio_mab_reporting        # Reporting, not model engineering
    - pretio_simulation           # Modelling exploration, not production ML
    - tinymob_kpi_monitoring      # Reporting
    - tinymob_aso                 # Marketing
    - tinymob_database_investment # Business case, not MLE

