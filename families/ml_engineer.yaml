# ---------------------------------------------------------------------------
# REVOICING GUIDANCE
# ---------------------------------------------------------------------------
revoicing_persona: >
  Translate bullets to emphasize production ML systems, deployment ownership,
  and model lifecycle management. MLE hiring managers want to know models
  ship, run reliably, and get evaluated rigorously. Use verbs like: deployed,
  built, engineered, optimized, automated, shipped, evaluated, monitored.
  Lead with the system or pipeline, follow with the model technique, close
  with the production outcome. Highlight MLOps signals: pipeline migration,
  platform cost reduction, Jenkins/Airflow, Docker. Where possible, frame
  DS work as "production model" work rather than research or analysis.
  Evaluation and governance signals (catching model failures, diagnosing
  cannibalization) are strong differentiators — highlight these explicitly.
