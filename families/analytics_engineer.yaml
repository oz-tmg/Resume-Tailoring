# ---------------------------------------------------------------------------
# REVOICING GUIDANCE
# ---------------------------------------------------------------------------
revoicing_persona: >
  Translate bullets to emphasize the craft of analytics engineering: clean
  data models, reliable pipelines, semantic layers, and enabling self-service
  analytics. This audience cares about data quality, transformation logic,
  warehouse performance, and the downstream trust that good modelling creates.
  Use verbs like: modelled, built, migrated, standardized, optimized, enabled,
  orchestrated, refactored. Highlight dbt, Snowflake, and warehouse-specific
  work prominently. Frame cost savings and latency improvements as engineering
  wins. Downplay soft stakeholder language — outcomes here are pipeline health,
  data freshness, and analyst productivity.

# ---------------------------------------------------------------------------
# GAMES-INDUSTRY REVOICING PERSONA
# ---------------------------------------------------------------------------
games_revoicing_persona: >
  Frame bullets in a live-games analytics engineering context. Use game-industry
  vocabulary where appropriate: telemetry pipelines, event schemas, player funnel
  modelling, live ops data delivery, game analytics platform. Emphasize that
  pipeline reliability and data quality directly affect game-team decision speed.
  Use verbs like: modelled, built, migrated, standardized, enabled, optimized.

# ---------------------------------------------------------------------------
# ATS TEMPLATE OVERRIDES (resume-ats.tex.j2 — single-column layout)
# ---------------------------------------------------------------------------
# These fields are consumed only when --template ats is passed to build.py.
# They are ignored by the standard two-column template. All three are
# optional — when absent, the renderer derives sensible defaults from the
# fields used by the standard template.
#
# ats_tagline       — keyword tagline rendered under the subtitle line in
#                     the navy header. Pass as a LaTeX-ready string;
#                     defaults to the first 6 entries of
#                     ats_keyword_watchlist joined with \textbullet.
# ats_skills_groups — list of {label, items: [...]} dicts that drive the
#                     Technical Skills key/value table. Items are
#                     rendered verbatim, so the family file can include
#                     phrases ("LTV forecasting", "A/B experimentation")
#                     that aren't strict entries in skills.yaml.
# impact_metrics    — 3 or 4 {value, label} entries shown in the
#                     Key Impact Metrics callout. Omit the field to skip
#                     the section entirely.
# `ats_tagline` is passed to LaTeX as-is (no escape) so it can include
# macros. Single-quoted YAML preserves the literal backslashes.
ats_tagline: 'dbt \textbullet\ Snowflake \textbullet\ Python \textbullet\ Airflow \textbullet\ Data Modeling \textbullet\ Marketing Analytics'

# Items in `ats_skills_groups` are rendered through latex_escape; write them
# as plain prose, NOT LaTeX. The renderer joins each group's items with
# ", " when emitting the table row. The ATS skills table is set in \small,
# and item lists are kept concise so each group fits on a single line.
ats_skills_groups:
  - label: "Pipeline & Orchestration"
    items:
      - "Apache Airflow"
      - "Prefect"
      - "AWS Firehose"
      - "Kinesis"
      - "Lambda"
      - "Glue"
      - "S3"
      - "Spark"
      - "Azure"
  - label: "Data Modeling & Transformation"
    items:
      - "dbt"
      - "MetricFlow"
      - "semantic layer design"
      - "data contracts"
      - "incremental models"
      - "Iceberg"
      - "Parquet"
  - label: "Storage & Warehousing"
    items:
      - "Snowflake"
      - "AWS Redshift"
      - "Athena"
      - "S3"
      - "Glue"
      - "GCP BigQuery"
  - label: "Programming Languages"
    items:
      - "Python (4+ yrs)"
      - "SQL (advanced)"
      - "R (expert)"
      - "Bash"
  - label: "Marketing Analytics"
    items:
      - "LTV forecasting"
      - "UA performance"
      - "AppsFlyer"
      - "acquisition funnels"
      - "A/B experimentation"
  - label: "BI & Delivery"
    items:
      - "Looker"
      - "AWS QuickSight"
      - "Tableau"
      - "RShiny"
      - "Amplitude"
  - label: "DevOps / DataOps"
    items:
      - "Docker"
      - "Terraform"
      - "Jenkins"
      - "Great Expectations"
      - "Git"
      - "data quality monitoring"

# Impact metric values and labels are escaped on render, so write them as
# plain text. `$`, `&`, `%` etc. are safe; Unicode arrows and em-dashes
# render natively via XeLaTeX.
impact_metrics:
  - value: "13x"
    label: "Report latency improvement (14 hrs → <1 hr) via dbt + Iceberg migration"
  - value: "$220K+/yr"
    label: "Annual cloud cost savings across Snowflake, EC2, Athena, and platform consolidation"
  - value: "$14M"
    label: "Acquisition overestimation identified via forecasting model — corrected before deal close"
  - value: "$2M+"
    label: "Incremental FIFA 19 revenue from A/B test pipeline and experimentation analytics"

# Key Achievements — curated per-family list rendered as the ATS template's
# "Key Achievements" box (a shaded, single-column list). title + description
# are both latex-escaped on render, so write them as plain text. 4 entries
# keeps the box compact enough to stay on page 1. Omit the field to skip the
# section. (These mirror the "Key Victories" gems in the standard resume's
# page-1 aside — keep the two in sync when editing.)
achievements:
  - title: "dbt Semantic Layer"
    description: >-
      Made dbt the studio's transformation standard — models, tests, docs, and
      a semantic layer feeding analysts and ML one source of truth.
  - title: "Self-Service Delivery"
    description: >-
      Cut a 14-hour daily refresh to under 1 hour and moved dashboards to AWS
      QuickSight via dbt-Athena models.
  - title: "Reporting Modernisation"
    description: >-
      Migrated analytics ETLs and BI jobs off Domino onto Jenkins — $27K/mo
      saved, reproducibility restored.
  - title: "Warehouse Cost Reduction"
    description: >-
      Cut Snowflake warehousing costs 45% (~$130K/year) through ETL and
      orchestration optimisation.

