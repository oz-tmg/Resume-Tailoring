# ---------------------------------------------------------------------------
# BULLET SELECTION RULES
# ---------------------------------------------------------------------------
bullet_selection:
  max_bullets_per_role:
    kano_senior_de_bi: 5          # This role is the strongest AE signal
    kix_lead: 4
    kix_senior: 3
    kix_product_analyst: 4
    ea_data_scientist: 2
    ea_business_analyst: 3
    pretio_data_scientist: 2
    tinymob_data_analyst: 1

  min_tier: 2

  # Roles listed here render with a two-section layout: "Responsibilities"
  # (category: work bullets) followed by "Outcomes" (category: outcome bullets).
  # Falls back to the standard flat list if only one category is present.
  split_sections:
    - kano_senior_de_bi

  priority_bullets:
    # Kano — strongest AE role by recency
    - kano_dbt                     # Core AE signal — dbt addition
    - kano_etl_performance         # Headline outcome — 14h → 1h, cost reduction
    - kano_rshiny_migration        # Migration + modernization (orchestration alt for postings)
    - kano_llm_translation         # LLM-assisted code migration
    - kano_manual_refactor         # Bilingual R/Python refactor, analytical parity
    - kano_anomaly_detection       # Live-ops anomaly detection migration
    - kano_analyst_adoption        # Enablement is core AE value prop
    - kano_iceberg_migration       # Technical depth — Parquet→Iceberg + DBT-Athena
    # Kixeye Lead
    - kix_gcp_aws_migration        # GCP → AWS Firehose/Lambda/Kinesis — strong AE/DE signal
    - kix_new_game_launches        # Analytics delivery for two new titles under fast turnaround
    - kix_two_games_delivery       # Reporting/tooling for two new launches
    - kix_snowflake_cost           # Cost + orchestration optimization
    - kix_looker_migration         # Cross-studio migration ownership
    - kix_cross_promo              # Analytics event design + SDK iteration
    # Kixeye Senior
    - kix_ab_automation            # Pipeline automation for analytics
    - kix_alliance_recsys          # Event schema design + data modelling → 7% revenue
    # Kixeye Product Analyst
    - kix_etl_repair               # ETL ownership signal
    - kix_revenue_attribution      # SQL/PySpark revenue-attribution modelling
    - kix_domino_jenkins           # Pipeline migration — strong AE signal
    - kix_ua_strategy              # AppsFlyer integration + UA data modelling
    - kix_ltv_forecast             # LTV model as stakeholder data product (weaker signal)
    # EA — light AE period
    - ea_ab_automation             # Workflow automation
    - ea_licensing_automation      # Automation of high-value reporting
    - ea_ab_test_design            # HiveQL/SQL experiment pipeline
    - ea_fifa19_revenue            # Pipeline → business outcome (outcome framing)

  exclude_bullets:
    - ea_mab_recsys                # Too ML engineering
    - ea_churn_reacquisition_models  # Too DS
    - ea_upsell_segmentation       # Too DS/targeting
    - kix_churn_model              # Too DS
    - kix_matchmaking_churn        # Too DS — now has AE variant but event design covered by kix_alliance_recsys
    - pretio_thompson_sampling     # Too algorithmic
    - pretio_simulation            # Too modelling
    - tinymob_aso                  # Marketing noise
    - tinymob_free_rider           # Economic framing, not AE
    - ea_exec_reporting            # Soft reporting, not pipeline

