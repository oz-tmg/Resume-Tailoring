# ---------------------------------------------------------------------------
# REVOICING GUIDANCE
# ---------------------------------------------------------------------------
revoicing_persona: >
  Translate bullets to emphasize the craft of analytics engineering: clean
  data models, reliable pipelines, semantic layers, and enabling self-service
  analytics. This audience cares about data quality, transformation logic,
  warehouse performance, and the downstream trust that good modelling creates.
  Use verbs like: modelled, built, migrated, standardized, optimized, enabled,
  orchestrated, refactored. Highlight dbt, Snowflake, and warehouse-specific
  work prominently. Frame cost savings and latency improvements as engineering
  wins. Downplay soft stakeholder language — outcomes here are pipeline health,
  data freshness, and analyst productivity.
