id: ECON
label: Economist
summary_ref: economist

# ---------------------------------------------------------------------------
# BULLET SELECTION RULES
# Note: This is the most selective family. The audience is academic-adjacent
# or policy/research-oriented. Heavy ML infrastructure is noise here.
# Lead with causal reasoning, experimental design, valuation, and evidence.
# The MA Economics and published thesis are your biggest differentiators.
# ---------------------------------------------------------------------------
bullet_selection:
  max_bullets_per_role:
    kano_senior_de_bi: 0          # No meaningful ECON signal — omit entirely
    kix_lead: 2
    kix_senior: 2
    kix_product_analyst: 2
    ea_data_scientist: 3
    ea_business_analyst: 4        # Strongest ECON role — propensity, licensing
    pretio_data_scientist: 3
    tinymob_data_analyst: 3

  min_tier: 2

  priority_bullets:
    - ea_companion_app            # Propensity score matching — core econometrics
    - ea_companion_app_revenue    # Incremental value estimation — economic framing
    - ea_licensing_models         # Value estimation and market design
    - ea_ab_test_design           # Experimental design
    - ea_upsell_segmentation      # Behavioral targeting with evidence
    - ea_fifa19_revenue           # Revenue impact from designed experiment
    - kix_forecasting_model   # Valuation + $14M overestimation correction
    - kix_content_cadence     # Market mechanism / incentive design framing
    - kix_ua_strategy             # ROI / investment framing
    - kix_ltv_forecast            # LTV / welfare estimation framing
    - kix_spend_conversion        # Experimentation + behavioral response
    - pretio_thompson_sampling    # Mechanism design — Bayesian optimal stopping
    - pretio_conversion_model     # Demand/response modelling
    - pretio_simulation           # Counterfactual simulation
    - tinymob_churn_gameplay      # Behavioral diagnosis + intervention
    - tinymob_paywall_cannibalisation  # Market structure / incentive analysis
    - tinymob_free_rider          # Classic economic externality framing

  exclude_bullets:
    - kano_dbt                    # Engineering, not economics
    - kano_etl_performance        # Infrastructure, not economics
    - kano_rshiny_migration       # BI tooling, not economics
    - kano_analyst_adoption       # Enablement, not economics
    - kix_snowflake_cost      # Infrastructure cost, not economic analysis
    - kix_looker_migration    # BI migration, not economics
    - kix_ab_automation       # Pipeline automation, not economics
    - kix_alliance_recsys     # RecSys framing, not economic
    - kix_churn_model         # ML framing, too technical
    - kix_matchmaking_churn   # ML/systems framing
    - kix_domino_jenkins          # MLOps, not economics
    - kix_etl_repair              # Engineering, not economics
    - ea_mab_recsys               # ML engineering, not economics
    - ea_churn_reacquisition_models  # ML models, too technical
    - ea_ab_automation            # Pipeline automation, not economics
    - ea_exec_reporting           # Reporting, not economics
    - ea_licensing_automation     # Automation, not economic analysis
    - ea_analyticon               # Presentation, not economics
    - tinymob_kpi_monitoring      # Monitoring, not economic analysis
    - tinymob_aso                 # Marketing, not economics
    - tinymob_database_investment # Infrastructure decision, not economics
    - pretio_mab_reporting        # Reporting, not economic analysis

