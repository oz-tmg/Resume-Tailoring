# ---------------------------------------------------------------------------
# REVOICING GUIDANCE
# ---------------------------------------------------------------------------
revoicing_persona: >
  Translate bullets using the vocabulary of economics and applied social
  science. This audience responds to causal language, mechanism design,
  and evidence-based reasoning. Use verbs like: estimated, evaluated,
  designed, identified, measured, modelled, published, analyzed, quantified.
  Frame product work in economic terms: incentives, externalities, market
  mechanisms, welfare effects, counterfactuals. Connect ML and statistical
  work to econometric traditions — a propensity score model is causal
  inference, not just a ML model. A recommendation engine is a matching
  mechanism. Churn is demand attrition. Revenue impact is welfare or
  surplus estimation. Lead with the research question, follow with method,
  close with the economic interpretation of the finding.
