# ---------------------------------------------------------------------------
# REVOICING GUIDANCE
# ---------------------------------------------------------------------------
revoicing_persona: >
  Translate bullets to demonstrate the full data science lifecycle: problem
  framing, data exploration, model development, evaluation, and translation
  into product decisions. Balance technical depth with business impact — DS
  hiring managers want both rigor and relevance. Use verbs like: developed,
  modelled, designed, evaluated, deployed, diagnosed, quantified, estimated.
  Lead with the problem or hypothesis, follow with the method, close with the
  measurable outcome. Causal inference and experimental design are core
  differentiators — highlight these explicitly. Where a bullet involves
  a model, include the technique and the performance metric.
