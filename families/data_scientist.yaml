# ---------------------------------------------------------------------------
# BULLET SELECTION RULES
# ---------------------------------------------------------------------------
bullet_selection:
  max_bullets_per_role:
    kano_senior_de_bi: 2          # Weak DS signal — use only infrastructure wins
    kix_lead: 4
    kix_senior: 4             # Strongest DS role in the portfolio
    kix_product_analyst: 3
    ea_data_scientist: 4          # Strong DS signal
    ea_business_analyst: 3
    pretio_data_scientist: 3
    tinymob_data_analyst: 2

  min_tier: 1                     # DS roles are competitive — lean tier 1 first

  priority_bullets:
    - kano_anomaly_detection      # Production statistical-monitoring framework
    - kix_forecasting_model   # $14M valuation finding — headline DS win
    - kix_matchmaking_churn   # Diagnosis + RecSys redesign
    - kix_churn_model         # AUC improvement — concrete model win
    - kix_alliance_recsys     # RecSys + revenue outcome
    - kix_content_cadence     # Funnel + time-series modelling
    - kix_ab_automation       # Experimentation infrastructure
    - kix_spend_conversion        # Experimentation + ML tooling
    - kix_ltv_forecast            # Forecasting accuracy
    - ea_ab_test_design           # Experimentation design
    - ea_upsell_segmentation      # Targeting + spend outcome
    - ea_fifa19_revenue           # Revenue impact from experimentation
    - ea_mab_recsys               # Multi-armed bandit RecSys
    - ea_churn_reacquisition_models  # Multi-model development
    - ea_companion_app            # Causal inference / propensity matching
    - ea_companion_app_revenue    # Incremental revenue outcome
    - pretio_thompson_sampling    # Bayesian MAB — strong DS signal
    - pretio_conversion_model     # Probability model
    - tinymob_churn_gameplay      # Churn diagnosis + retention improvement

  # Cross-family promotion: include these bullets for DS even though they
  # are not tagged DS. DS work overlaps with DE/AE on data modelling and
  # ETL/warehouse fluency — surfacing this signal keeps the recent role
  # honest about the platform context our DS work runs on.
  promote_bullets:
    - kano_etl_performance        # ETL refresh 14h → 1h on partitioned Parquet/Iceberg

  exclude_bullets:
    - kano_rshiny_migration       # Too BI/reporting
    - kano_analyst_adoption       # Team enablement, not DS
    - ea_exec_reporting           # Soft reporting
    - ea_licensing_automation     # Automation, not modelling
    - ea_companion_app_analyticon               # Presentation, not DS work
    - tinymob_aso                 # Marketing, not DS
    - tinymob_kpi_monitoring      # Reporting, not DS
    - tinymob_database_investment # Stakeholder influence, not DS

