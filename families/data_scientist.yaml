# ---------------------------------------------------------------------------
# REVOICING GUIDANCE
# ---------------------------------------------------------------------------
revoicing_persona: >
  Translate bullets to demonstrate the full data science lifecycle: problem
  framing, data exploration, model development, evaluation, and translation
  into product decisions. Balance technical depth with business impact — DS
  hiring managers want both rigor and relevance. Use verbs like: developed,
  modelled, designed, evaluated, deployed, diagnosed, quantified, estimated.
  Lead with the problem or hypothesis, follow with the method, close with the
  measurable outcome. Causal inference and experimental design are core
  differentiators — highlight these explicitly. Where a bullet involves
  a model, include the technique and the performance metric.

# ---------------------------------------------------------------------------
# GAMES-INDUSTRY REVOICING PERSONA
# Used when --industry games is passed to the build.
# ---------------------------------------------------------------------------
games_revoicing_persona: >
  Frame bullets in live-games and F2P context. Use game-industry vernacular
  where it fits naturally: DAU/WAU, live ops, LTO systems, engagement loops,
  churn win-back, meta progression, matchmaking, player segmentation, F2P
  monetization funnels. Emphasize that experimentation and modelling happened
  in live-service environments with network effects, player lifecycle complexity,
  and real-time feedback loops. Use verbs like: developed, modelled, designed,
  deployed, diagnosed. Lead with the game-systems problem, follow with the
  method, close with the measurable player or revenue outcome.

# ---------------------------------------------------------------------------
# ASIDE SKILLS — PAGE 2 SIDEBAR
# Defines the skillset sections for the pg2 sidebar. When a job posting is
# provided, these sections are reordered by posting keyword relevance.
# programming_latex is passed directly to LaTeX (not escaped).
# ---------------------------------------------------------------------------
aside_skills:
  page2:
    title: "Data Science Skillset"
    sections:
      - id: experimentation
        label: "Experimentation & Measurement"
        keywords: [experimentation, A/B testing, experiment, uplift, holdout,
                   hypothesis, measurement, statistical testing, CUPED, power analysis]
        text: >
          Designed and evaluated experiments in live digital ecosystems where
          network effects, feature overlap, and behavioral spillovers
          complicated clean inference.
      - id: personalization
        label: "Personalization & Recommendation"
        keywords: [recommendation, personalization, ranking, RecSys, targeting,
                   collaborative filtering, content, offers, engagement, retention]
        text: >
          Built ranking, targeting, and RecSys approaches for content, offers,
          and social experiences to improve engagement, conversion, and retention.
      - id: predictive_modeling
        label: "Predictive Modeling"
        keywords: [predictive modelling, churn, LTV, forecasting, reacquisition,
                   spend conversion, survival analysis, classification, regression]
        text: >
          Developed churn, spend conversion, reacquisition, and long-term
          revenue forecasting models used to guide product, portfolio, and
          acquisition decisions.
      - id: causal_inference
        label: "Causal Inference"
        keywords: [causal inference, propensity score, DiD, difference-in-differences,
                   quasi-experimental, regression discontinuity, interaction effects,
                   observational studies, CEM]
        text: >
          Applied propensity score methods, regression modelling, interaction
          effects, and quasi-experimental reasoning to estimate incremental
          product impact.
      - id: model_governance
        label: "Model Evaluation & Governance"
        keywords: [model evaluation, governance, cannibalization, LTO, holdout,
                   diagnosis, model retirement, model monitoring, model audit]
        text: >
          Diagnosed when a Limited Time Offer rec engine's short-term lift
          masked longer-term cannibalization, leading to its retirement.
    programming_latex: 'R, {\color{red} $\varheartsuit$} Python, SQL, Bash, Ruby'
