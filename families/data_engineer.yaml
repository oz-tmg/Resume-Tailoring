# ---------------------------------------------------------------------------
# BULLET SELECTION RULES
# ---------------------------------------------------------------------------
bullet_selection:
  max_bullets_per_role:
    kano_senior_de_bi: 4          # Strongest DE role by recency
    kix_lead: 3
    kix_senior: 2
    kix_product_analyst: 3
    ea_data_scientist: 2
    ea_business_analyst: 2
    pretio_data_scientist: 1
    tinymob_data_analyst: 0       # Minimal DE signal — omit unless space

  min_tier: 2

  # Roles listed here render with a two-section layout: "Responsibilities"
  # (category: work bullets) followed by "Outcomes" (category: outcome bullets).
  # Falls back to the standard flat list if only one category is present.
  split_sections:
    - kano_senior_de_bi

  priority_bullets:
    - kano_dbt
    - kano_etl_performance         # Headline outcome — 14h → 1h, cost reduction
    - kano_iceberg_migration       # Technical depth — Parquet→Iceberg + DBT-Athena
    - kano_rshiny_migration
    - kix_gcp_aws_migration        # GCP → AWS Firehose/Lambda/Kinesis — strong DE signal
    - kix_snowflake_cost           # 45% Snowflake cost reduction — strong signal
    - kix_looker_migration         # Infrastructure migration ownership
    - kix_new_game_launches        # Analytics infra delivery for two new titles
    - kix_domino_jenkins           # ML + analytics pipeline migration — $27K/mo
    - kix_etl_repair
    - kix_ab_automation            # Automation pipeline
    - ea_ab_automation             # Hive/Jenkins/Redshift workflow
    - ea_licensing_automation      # R + Talend pipeline

  exclude_bullets:
    - kix_forecasting_model    # DS framing, not infrastructure
    - kix_matchmaking_churn    # DS diagnosis, not pipeline
    - kix_alliance_recsys      # RecSys, not DE
    - kix_churn_model          # ML model, not infrastructure
    - kix_content_cadence      # Product analytics framing
    - kix_ua_strategy              # Business strategy, not engineering
    - kix_ltv_forecast             # Forecasting, not pipeline
    - ea_mab_recsys                # RecSys, not DE
    - ea_churn_reacquisition_models  # DS model, not DE
    - ea_upsell_segmentation       # Analytics, not pipeline
    - ea_companion_app             # Causal inference, not DE
    - ea_companion_app_revenue     # Business outcome, not DE
    - ea_companion_app_analyticon                # Presentation, not DE
    - ea_exec_reporting            # Soft reporting
    - pretio_thompson_sampling     # Algorithmic, not infrastructure
    - pretio_simulation            # Modelling, not infrastructure
    - pretio_mab_reporting         # Analytics, not DE
    - tinymob_kpi_monitoring       # DA work
    - tinymob_aso                  # Marketing, not DE
    - tinymob_free_rider           # Economics framing
    - tinymob_churn_gameplay       # DA/DS, not DE

