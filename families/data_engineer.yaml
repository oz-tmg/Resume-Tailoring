# ---------------------------------------------------------------------------
# REVOICING GUIDANCE
# ---------------------------------------------------------------------------
revoicing_persona: >
  Translate bullets to emphasize system reliability, pipeline scale,
  infrastructure ownership, and engineering craft. This audience wants to
  know you can own a data platform end-to-end. Use verbs like: built,
  engineered, architected, deployed, migrated, orchestrated, optimized,
  reduced, scaled. Lead with concrete metrics: cost savings, latency
  improvements, system uptime, data freshness. Minimize soft business
  framing — "stakeholder" language should be replaced with "downstream
  consumers" or "data consumers." Frame modeling work as transformation
  pipeline work, not analytical work.

# ---------------------------------------------------------------------------
# GAMES-INDUSTRY REVOICING PERSONA
# ---------------------------------------------------------------------------
games_revoicing_persona: >
  Frame bullets in a live-games data engineering context. Use game-industry
  vocabulary where appropriate: telemetry pipelines, event ingestion, player
  data at scale, live ops data delivery, game analytics platform. Emphasize
  that latency improvements and system reliability directly affect studio
  decision speed and game health monitoring. Use verbs like: built,
  engineered, migrated, deployed, orchestrated.

# ---------------------------------------------------------------------------
# ASIDE SKILLS — PAGE 2 SIDEBAR
# ---------------------------------------------------------------------------
aside_skills:
  page2:
    title: "Engineering Approach"
    sections:
      - id: pipeline_reliability
        label: "Pipeline Reliability"
        keywords: [reliability, legacy, ETL, debt, repair, trust, pipeline,
                   diagnostic, reporting, stability, stakeholder trust]
        text: >
          Diagnosed and repaired legacy ETL debt systematically — restoring
          stakeholder trust in core reporting before building new on top.
      - id: cost_latency
        label: "Cost & Latency"
        keywords: [cost, latency, performance, migration, trade-off, baseline,
                   measured, infrastructure, platform, optimization, savings]
        text: >
          Evaluated platform and infrastructure trade-offs with cost and
          latency together, not separately. Migration decisions driven by
          measured baselines, not assumptions.
      - id: ml_pipeline_ops
        label: "ML Pipeline Ops"
        keywords: [ML pipeline, machine learning, orchestration, migration,
                   model, Domino, Jenkins, retraining, batch scoring, cost]
        text: >
          Maintained and migrated ML pipelines and DS applications between
          orchestration platforms, preserving model behaviour and reducing
          operating cost.
      - id: experimentation_infra
        label: "Experimentation Infra"
        keywords: [experimentation, A/B, automation, experiment, pipeline,
                   automated, reproducible, self-service, analysis, readout]
        text: >
          Automated A/B test analysis pipelines and ML eval workflows to
          make experimental readouts reproducible and self-service.
      - id: analytics_bi
        label: "Analytics & BI Delivery"
        keywords: [dashboard, BI, segmentation, analytics, UA, reporting,
                   ingestion, insight, visualization, stack]
        text: >
          Built and maintained dashboards, segmentation tools, and UA
          analytics alongside pipeline work — owning the full stack from
          ingestion to insight.
    programming_latex: 'Python, SQL, R, Bash, Ruby'
